<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Hero demo illustration with devices and light shapes">
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0%" stop-color="#E8F4FF"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="b" />
      <feBlend in="SourceGraphic" in2="b" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- soft glow -->
  <circle cx="920" cy="140" r="90" fill="#FFEDCC" opacity="0.9"/>

  <!-- Device mockup -->
  <g transform="translate(220,200)">
    <rect x="0" y="0" width="420" height="260" rx="18" fill="#ffffff" stroke="#E6EEF8" stroke-width="2" filter="url(#soft)"/>
    <rect x="20" y="18" width="380" height="200" rx="8" fill="#1664AF"/>
    <g fill="#fff" font-family="Arial" font-size="20" font-weight="600">
      <text x="40" y="70">App Preview</text>
    </g>
  </g>

  <!-- smaller card -->
  <g transform="translate(520,380) scale(0.85)">
    <rect x="0" y="0" width="260" height="160" rx="12" fill="#10A37F"/>
    <circle cx="40" cy="40" r="10" fill="#fff"/>
    <rect x="64" y="28" width="140" height="18" rx="6" fill="#fff"/>
  </g>

  <!-- decorative leaves -->
  <g transform="translate(100,480)">
    <path d="M0 40 C30 10, 70 10, 100 40 C70 30, 30 30, 0 40Z" fill="#DFF8EE"/>
    <path d="M20 20 C40 5, 60 5, 80 20 C60 15, 40 15, 20 20Z" fill="#BFF0D6"/>
  </g>

</svg>
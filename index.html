   <h1>Registration Form</h1>

    <form>

        <label for="name">Full Name:</label><br>
        <input type="text" id="name" name="name" placeholder="Enter your full name"><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" placeholder="Enter your email"><br><br>

        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number"><br><br>

        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password" placeholder="Enter your password"><br><br>

        <label>Gender:</label><br>
        <input type="radio" id="male" name="gender">
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender">
        <label for="female">Female</label>

        <input type="radio" id="other" name="gender">
        <label for="other">Other</label>
        <br><br>

        <label>Skills:</label><br>
        <input type="checkbox" id="html">
        <label for="html">HTML</label>

        <input type="checkbox" id="css">
        <label for="css">CSS</label>

        <input type="checkbox" id="javascript">
        <label for="javascript">JavaScript</label>
        <br><br>

        <label for="country">Country:</label><br>
        <select id="country">
            <option>Bangladesh</option>
            <option>India</option>
            <option>Pakistan</option>
            <option>Nepal</option>
        </select>
        <br><br>

        <label for="about">About Yourself:</label><br>
        <textarea id="about" rows="5" cols="30" placeholder="Write something..."></textarea>
        <br><br>

        <button type="submit">Register</button>
        <button type="reset">Reset</button>

    </form>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Tree and flower illustration">
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#E6F4FF"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#FFFBEB" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFFBEB" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#sky)"/>
  <circle cx="900" cy="120" r="80" fill="url(#glow)" />

  <!-- Ground -->
  <rect x="0" y="560" width="1200" height="240" fill="#F1F5F9"/>

  <!-- Tree -->
  <g transform="translate(220,360)">
    <rect x="-30" y="60" width="60" height="160" rx="12" fill="#8B5A2B"/>
    <g>
      <ellipse cx="0" cy="0" rx="110" ry="80" fill="#10A37F"/>
      <ellipse cx="-60" cy="-10" rx="70" ry="50" fill="#0EA47A"/>
      <ellipse cx="60" cy="-20" rx="70" ry="50" fill="#0EA47A"/>
      <circle cx="-20" cy="10" r="8" fill="#FFF7C2" opacity="0.9"/>
      <circle cx="40" cy="-10" r="6" fill="#FFF7C2" opacity="0.9"/>
    </g>
  </g>

  <!-- Flower cluster -->
  <g transform="translate(640,520) scale(1.1)">
    <g transform="translate(-40,-40)">
      <path d="M40 72c10-28 36-40 36-40s-22-2-36 10c-14-12-36-10-36-10s26 12 36 40z" fill="#F59E0B" opacity="0.95"/>
      <circle cx="40" cy="40" r="10" fill="#FFF"/>
    </g>
    <g transform="translate(30,0)">
      <path d="M32 66c8-22 28-32 28-32s-17-2-28 8c-11-10-28-8-28-8s20 10 28 32z" fill="#FF7AB6" opacity="0.95"/>
      <circle cx="32" cy="32" r="8" fill="#FFF"/>
    </g>
  </g>

  <!-- Subtle highlights -->
  <g opacity="0.06" fill="#000">
    <ellipse cx="300" cy="620" rx="220" ry="24"/>
    <ellipse cx="760" cy="660" rx="160" ry="18"/>
  </g>

</svg>